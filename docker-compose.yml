version: "3.9"

services:

  backend:
    build:
      context: ./backend

    container_name: myapp

    ports:
      - "5000:5000"

    restart: always

    volumes:
      - ./logs:/app/logs
      - ./backups:/app/backups

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    image: nginx:latest

    container_name: dashboard

    volumes:
      - ./frontend:/usr/share/nginx/html:ro

    ports:
      - "8080:80"

    depends_on:
      backend:
        condition: service_healthy

    restart: always